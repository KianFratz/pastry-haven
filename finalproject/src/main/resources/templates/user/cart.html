<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart - PastryHaven</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-pink-50 font-sans">
<!-- Navigation -->
<nav class="bg-white shadow-md py-4">
  <div class="container mx-auto px-6 flex items-center justify-between">
    <div class="flex items-center">
      <a href="/">
        <span class="text-pink-500 text-2xl font-bold">PastryHaven</span>
      </a>
      <!-- Render the username from the model -->
      <a class="ml-6 text-gray-600 hover:text-pink-500 transition duration-300">
        Welcome, <span th:text="${session.customer.firstName}">User</span>!

      </a>
    </div>
    <div class="hidden md:flex items-center space-x-8">
      <a href="/user/products" class="text-gray-600 hover:text-pink-500 transition duration-300">Product</a>
      <a href="/user/cart" class="text-gray-600 hover:text-pink-500 transition duration-300">Cart</a>
      <a href="/checkout/history" class="text-gray-600 hover:text-pink-500 transition duration-300">History</a>
      <a href="/customer/aboutus" class="text-gray-600 hover:text-pink-500 transition duration-300">About Us</a>
      <a href="/customer/logout" class="text-gray-600 hover:text-pink-500 transition duration-300">Log out</a>

    </div>
  </div>
</nav>

<!-- Cart Section -->
<section class="container mx-auto px-6 py-12">
  <div class="bg-white rounded-3xl shadow-lg p-8 max-w-4xl mx-auto">
    <h2 class="text-3xl font-bold text-center text-pink-500 mb-8">Your Shopping Cart</h2>

    <div th:if="${#lists.isEmpty(cart)}" class="text-center py-10">
      <p class="text-gray-700">Your cart is empty.</p>
      <a href="/user/products" class="mt-4 inline-block text-pink-500 font-semibold hover:underline">Continue shopping &raquo;</a>
    </div>

    <div th:if="${!#lists.isEmpty(cart)}">
      <table class="w-full text-left border-collapse mb-6">
        <thead>
        <tr class="border-b border-pink-200">
          <th class="py-3 px-4 text-gray-600">Product</th>
          <th class="py-3 px-4 text-gray-600">Price</th>
          <th class="py-3 px-4 text-gray-600">Quantity</th>
          <th class="py-3 px-4 text-gray-600">Total</th>
          <th class="py-3 px-4 text-gray-600">Action</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="item : ${cart}" class="border-b border-gray-100 hover:bg-pink-50">
          <td class="py-4 px-4" th:text="${item.product.name}"></td>
          <td class="py-4 px-4" th:text="${item.product.price}"></td>
          <td class="py-4 px-4">
            <form th:action="@{/user/cart/update}" method="post" class="flex items-center space-x-2">
              <input type="hidden" name="id" th:value="${item.id}" />
              <input type="number" name="quantity" min="1" max="99"
                     th:value="${item.quantity}"
                     class="w-20 border border-gray-300 rounded-lg px-2 py-1 focus:outline-none focus:ring-2 focus:ring-pink-200" />
              <button type="submit" class="text-pink-500 hover:underline text-sm">Update</button>
            </form>
          </td>
          <td class="py-4 px-4 font-semibold" th:text="${item.product.price * item.quantity}"></td>
          <td class="py-4 px-4">
            <a th:href="@{/user/cart/remove(id=${item.product.id})}"
               class="text-red-500 hover:underline text-sm">Remove</a>
          </td>
        </tr>
        </tbody>
      </table>

      <div class="flex justify-between items-center mb-6">
        <span class="text-xl font-bold text-gray-700">Subtotal:</span>
        <span class="text-2xl font-extrabold text-pink-600" th:text="${cartTotal}"></span>
      </div>

      <div class="flex space-x-4">
        <a href="/user/products"
           class="flex-1 py-3 bg-gray-300 text-gray-700 font-semibold rounded-full hover:bg-gray-400 transition duration-300 text-center">
          Continue Shopping
        </a>
        <a href="/user/checkout"
           class="flex-1 py-3 bg-pink-500 text-white font-semibold rounded-full hover:bg-pink-600 transition duration-300 text-center">
          Proceed to Checkout
        </a>
      </div>
    </div>
  </div>
</section>

<!-- Footer -->
<footer class="bg-pink-500 text-white py-6">
  <div class="container mx-auto px-6 text-center">
    <p>&copy; 2025 PastryHaven. All rights reserved.</p>
  </div>
</footer>
</body>

</html>
