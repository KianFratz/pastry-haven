            <!-- Product Cards Grid -->
            <div class="grid grid-cols-3 sm:grid-cols-2 md:grid-cols-2 lg:grid-cols-3 gap-8 max-w-[65rem] mx-auto">
                <!-- Single Card -->
                <div th:each="product : ${products}" class="bg-white border border-pink-200 rounded-2xl shadow-md overflow-hidden hover:shadow-xl transition-all duration-300">

                    <!-- Image Banner -->
                    <div class="h-64 bg-pink-100 flex items-center justify-center">
                        <img th:src="@{'/images/' + ${product.imageFileName}}"
                             th:alt="${product.name}"
                             class="object-cover h-full w-full" />
                    </div>

                    <!-- Content Area -->
                    <div class="p-6 space-y-4">
                        <h3 th:text="${product.name}" class="text-2xl font-extrabold text-pink-600"></h3>
                        <p th:text="${product.description}" class="text-gray-700"></p>
                        <div class="flex items-center justify-between">
                            <span th:text="${product.stock + ' in stock'}" class="inline-block bg-pink-100 text-pink-800 text-sm font-semibold px-3 py-1 rounded-full"></span>
                            <span th:text="${product.price}" class="text-2xl font-bold text-pink-500"></span>
                        </div>

                        <!-- Form Starts Here -->
                        <form th:action="@{/user/cart/add/{productId}(productId=${product.id})}" method="post" class="space-y-2">
                            <!-- Quantity Input -->
                            <div class="flex items-center gap-2">
                                <label class="input-group-text">Quantity</label>
                                <input type="number"
                                       name="quantity"
                                       value="1"
                                       min="1"
                                       th:max="${product.stock}"
                                       class="form-control w-24 rounded border border-pink-300 px-2 py-1" required />
                            </div>

                            <!-- CSRF Token (if using Spring Security) -->
<!--                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />-->

                            <!-- Submit Button -->
                            <button type="submit"
                                    class="w-full py-2 bg-pink-500 hover:bg-pink-600 text-white rounded-full">
                                Add to Cart
                            </button>
                        </form>
                    </div>
                </div>
            </div>


        </div>
    </section>
