<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Confirmation - Pastry Haven</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800">

<div class="container mx-auto px-4 mt-10">

  <!-- Success Alert -->
  <div th:if="${successMessage}"
       th:text="${successMessage}"
       class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded mb-6"
       role="alert">
  </div>

  <!-- Order Confirmation Card -->
  <div class="bg-white shadow-md rounded-lg mb-8">
    <div class="bg-green-600 text-white px-6 py-4 rounded-t-lg">
      <h3 class="text-xl font-semibold">Order Confirmation</h3>
    </div>
    <div class="p-6">
      <h5 class="text-lg font-medium mb-2">Thank you for your order!</h5>
      <p class="mb-6">Your payment has been processed successfully.</p>

      <!-- Payment Details -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <h6 class="text-md font-semibold mb-2">Payment Details</h6>
          <table class="w-full text-sm">
            <tr>
              <th class="text-left pr-4">Order ID:</th>
              <td th:text="${payment.id}"></td>
            </tr>
            <tr>
              <th class="text-left pr-4">Date:</th>
              <td th:text="${#temporals.format(payment.paymentDate, 'MMMM dd, yyyy HH:mm')}"></td>
            </tr>
            <tr>
              <th class="text-left pr-4">Payment Method:</th>
              <td th:text="${payment.paymentMethod}"></td>
            </tr>
            <tr>
              <th class="text-left pr-4">Total Amount:</th>
              <td th:text="${#numbers.formatCurrency(payment.totalAmount)}"></td>
            </tr>
          </table>
        </div>
      </div>

      <!-- Order Summary -->
      <h6 class="text-md font-semibold mt-8 mb-2">Order Summary</h6>
      <div class="overflow-x-auto">
        <table class="min-w-full text-sm text-left border-t border-gray-200">
          <thead class="bg-gray-100">
          <tr>
            <th class="px-4 py-2">Product</th>
            <th class="px-4 py-2">Price</th>
            <th class="px-4 py-2">Quantity</th>
            <th class="px-4 py-2">Subtotal</th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="item : ${payment.paymentItems}" class="border-b">
            <td class="px-4 py-2" th:text="${item.productName}"></td>
            <td class="px-4 py-2" th:text="${#numbers.formatCurrency(item.productPrice)}"></td>
            <td class="px-4 py-2" th:text="${item.quantity}"></td>
            <td class="px-4 py-2" th:text="${#numbers.formatCurrency(item.subtotal)}"></td>
          </tr>
          </tbody>
          <tfoot>
          <tr class="font-semibold">
            <td colspan="3" class="px-4 py-2 text-right">Total:</td>
            <td class="px-4 py-2" th:text="${#numbers.formatCurrency(payment.totalAmount)}"></td>
          </tr>
          </tfoot>
        </table>
      </div>
    </div>
  </div>

  <!-- Buttons -->
  <div class="flex flex-col sm:flex-row gap-3">
    <a href="/user/products" class="bg-pink-500 hover:bg-pink-600 text-white text-center py-2 px-4 rounded font-medium">
      Continue Shopping
    </a>
    <a th:href="@{/checkout/history}"
       class="text-center py-2 px-4 border border-gray-300 rounded text-gray-700 hover:bg-gray-100 font-medium">
      View Payment History
    </a>
  </div>
</div>

</body>
</html>
