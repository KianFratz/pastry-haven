<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Cart Item</title>
    <!-- include your CSS/JS -->
</head>
<body>
<h1 class="text-3xl font-bold mb-4">Edit Cart Item</h1>

<form th:action="@{/user/cart/save}" th:object="${item}" method="post" class="max-w-md">
    <div class="mb-4">
        <label class="block font-semibold mb-1">Product</label>
        <input type="text" readonly
               th:value="${item.product.name}"
               class="w-full border px-3 py-2 bg-gray-100" />
    </div>

    <!--    fetch product id-->
    <input type="hidden" th:field="*{id}" />
    <input type="hidden" name="productId" th:value="${item.product.id}" />

    <div class="mb-4">
        <label class="block font-semibold mb-1" for="quantity">Quantity</label>
        <input type="number" id="quantity" name="quantity"
               th:field="*{quantity}"
               min="1"
               class="w-full border px-3 py-2" />
    </div>

    <input type="hidden" th:field="*{id}" />

    <div class="flex space-x-2">
        <button type="submit"
                class="px-4 py-2 bg-green-500 text-white rounded hover:bg-green-600">
            Save
        </button>
        <a th:href="@{/user/cart}"
           class="px-4 py-2 bg-gray-400 text-white rounded hover:bg-gray-500">
            Cancel
        </a>
    </div>
</form>
</body>
</html>
