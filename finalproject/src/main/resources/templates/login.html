<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PastryHaven</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-pink-50 font-sans">
    <!-- Navigation -->
    <nav class="bg-white shadow-md py-4">
        <div class="container mx-auto px-6 flex items-center justify-between">
            <div class="flex items-center">
                <a href="/">
                    <span class="text-pink-500 text-2xl font-bold">PastryHaven</span>
                </a>
            </div>
            <div class="hidden md:flex items-center space-x-8">
				<a href="/login" class="text-gray-600 hover:text-pink-500 transition duration-300">Login</a>
				<a href="/register" class="text-gray-600 hover:text-pink-500 transition duration-300">Register</a>
            </div>
        </div>
    </nav>

    <!-- Login Form Section -->
    <section class="container mx-auto px-6 py-12">
        <div class="bg-white rounded-3xl shadow-lg p-8 md:p-12">
            <h2 class="text-3xl font-bold text-center text-pink-500 mb-8">Login</h2>
            
            <!-- Form -->
            <form th:action="@{/login}" th:object="${customer}" method="POST" class="max-w-2xl mx-auto">
                <div class="mb-6">
                    <label class="block text-pink-600 font-medium mb-2">Email Address</label>
                    <input th:field="*{emailAddress}" type="email" id="email" required
                        class="w-full px-4 py-3 rounded-lg border border-pink-200 focus:outline-none focus:border-pink-500" />
                    <p th:if="${emailError}" th:text="${emailError}"
                       class="text-red-600 text-sm"></p>
                </div>
                
                <div class="mb-6">
                    <label class="block text-pink-600 font-medium mb-2">Password</label>
                    <input th:field="*{password}" type="password" id="password" required
                        class="w-full px-4 py-3 rounded-lg border border-pink-200 focus:outline-none focus:border-pink-500" />
                    <p th:if="${passwordError}" th:text="${passwordError}"
                       class="text-red-600 text-sm"></p>
                </div>
                
                <div class="flex justify-between items-center mb-6">
                    <div class="flex items-center">
                        <input type="checkbox" id="remember" class="h-4 w-4 text-pink-500 border-pink-300 rounded">
                        <label for="remember" class="ml-2 text-gray-600">Remember me</label>
                    </div>
                    <a href="/forgot-password" class="text-pink-500 hover:text-pink-700 text-sm">Forgot password?</a>
                </div>
                
                <div class="flex justify-center mt-8">
                    <button type="submit" class="py-3 px-12 bg-pink-500 rounded-full text-white hover:bg-pink-700 transition-all duration-200">Login</button>
                </div>
                
                <div class="text-center mt-6">
                    <p class="text-gray-600">Don't have an account? <a href="/register" class="text-pink-500 hover:text-pink-700">Register here</a></p>
                </div>
            </form>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-pink-500 text-white py-8">
        <div class="container mx-auto px-6">
            <div class="flex flex-col md:flex-row justify-between items-center">
                <div class="mb-6 md:mb-0">
                    <span class="text-2xl font-bold">PastryHaven</span>
                    <p class="mt-2">Making the world a happy place to eat with since 2025</p>
                </div>
                <div class="flex space-x-6">
                    <a href="#" class="hover:text-pink-200 transition duration-300">
                        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">

                        </svg>
                    </a>
                    <a href="#" class="hover:text-pink-200 transition duration-300">
                        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M12 0c-6.627 0-12 5.373-12 12s5.373 12 12 12 12-5.373 12-12-5.373-12-12-12zm-2 16h-2v-6h2v6zm-1-6.891c-.607 0-1.1-.496-1.1-1.109 0-.612.492-1.109 1.1-1.109s1.1.497 1.1 1.109c0 .613-.493 1.109-1.1 1.109zm8 6.891h-1.998v-2.861c0-1.881-2.002-1.722-2.002 0v2.861h-2v-6h2v1.093c.872-1.616 4-1.736 4 1.548v3.359z"></path>

                </div>
            </div>
            <div class="border-t border-pink-400 mt-8 pt-8 text-center">
                <p>&copy; 2025 PastryHaven. All rights reserved.</p>
            </div>
        </div>
    </footer>
</body>

</html>
